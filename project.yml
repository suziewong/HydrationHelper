name: HydrationHelper
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "12.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  HydrationHelper:
    type: application
    platform: macOS
    sources:
      - path: HydrationHelper
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.HydrationHelper
        INFOPLIST_FILE: HydrationHelper/Info.plist
        PRODUCT_NAME: 喝水提醒
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    info:
      path: HydrationHelper/Info.plist
      properties:
        CFBundleName: HydrationHelper
        CFBundleDisplayName: HydrationHelper
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: false
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
